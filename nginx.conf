# nginx.conf — Sirve el sitio estático de Astro (dist/) dentro del contenedor.
# Se copia a /etc/nginx/conf.d/default.conf (ver Dockerfile). Ver CLAUDE.md §10.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Oculta la versión de nginx en las respuestas
    server_tokens off;

    # ---------- Compresión ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/xml
        application/rss+xml
        font/woff2;

    # ---------- Assets con hash de Astro (/_astro/…): cache inmutable 1 año ----------
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------- Otros estáticos: cache de 30 días ----------
    location ~* \.(?:css|js|jpe?g|png|webp|avif|gif|ico|svg|woff2?|ttf|otf|mp4|webm|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Página 404 personalizada
    error_page 404 /404.html;

    # ---------- HTML y navegación ----------
    location / {
        try_files $uri $uri/ $uri.html =404;

        # El HTML no se cachea fuerte (para ver cambios al re-desplegar)
        add_header Cache-Control "no-cache";

        # Cabeceras de seguridad (buenas prácticas / Lighthouse)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}
